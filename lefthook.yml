pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{js,mjs,ts,astro,md,mdx,json,css,yml,yaml}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,mjs,ts,astro}'
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
